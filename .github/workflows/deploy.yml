name: Deploy to InsForge

on:
  push:
    branches: [main]
  # Lets you re-deploy without an empty commit (Actions tab -> Run workflow).
  workflow_dispatch:

# A newer push supersedes an in-flight deploy instead of racing it to production.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Authenticate with InsForge
        env:
          USER_API_KEY: ${{ secrets.INSFORGE_USER_API_KEY }}
          PROJECT_API_KEY: ${{ secrets.INSFORGE_PROJECT_API_KEY }}
        run: |
          set -uo pipefail

          # A uak_ user API key is the CI-intended credential. It replaces the
          # OAuth refresh-token exchange that used to live here, which expired on
          # a ~30-day clock and broke every deploy until someone noticed.
          if [ -z "${USER_API_KEY:-}" ]; then
            echo "::error title=Missing secret::INSFORGE_USER_API_KEY is not set on this repository."
            exit 1
          fi

          if ! npx @insforge/cli@latest login --user-api-key "$USER_API_KEY"; then
            echo "::error title=InsForge auth failed::INSFORGE_USER_API_KEY was rejected. Create a replacement in the InsForge dashboard (Profile -> API Keys), then: gh secret set INSFORGE_USER_API_KEY"
            exit 1
          fi

          mkdir -p .insforge
          jq -n --arg k "$PROJECT_API_KEY" '{
            project_id: "cc5c166d-a938-43d9-b453-e5fc17a9fd7b",
            project_name: "Job-pilot",
            org_id: "b1a60c39-2c6f-4dd3-aa3f-1896ee8bf988",
            appkey: "8kj4iaqv",
            region: "eu-central",
            oss_host: "https://8kj4iaqv.eu-central.insforge.app",
            api_key: $k
          }' > .insforge/project.json

      - name: Deploy
        run: npx @insforge/cli@latest deployments deploy .

      - name: Verify the site is actually serving
        run: |
          set -uo pipefail
          # A READY deployment record is not proof the site responds. Poll the
          # real origin so a broken deploy fails here instead of in a user's face.
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -m 15 https://devjob.info/ || echo "000")
            echo "attempt ${i}: HTTP ${CODE}"
            if [ "$CODE" = "200" ]; then
              echo "Site is live."
              exit 0
            fi
            sleep 10
          done
          echo "::error title=Deploy verification failed::https://devjob.info/ never returned 200 after the deploy completed."
          exit 1
