name: Deploy to InsForge

on:
  push:
    branches: [main]
  # Lets you re-deploy without an empty commit (Actions tab -> Run workflow).
  workflow_dispatch:

# A newer push supersedes an in-flight deploy instead of racing it to production.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Authenticate with InsForge
        env:
          REFRESH_TOKEN: ${{ secrets.INSFORGE_REFRESH_TOKEN }}
          PROJECT_API_KEY: ${{ secrets.INSFORGE_PROJECT_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${REFRESH_TOKEN:-}" ]; then
            echo "::error title=Missing secret::INSFORGE_REFRESH_TOKEN is not set on this repository."
            exit 1
          fi

          # Capture the status separately: `curl -f` collapses every failure into
          # exit 22, which is what made the previous breakage unreadable.
          HTTP=$(curl -s -o /tmp/insforge-token.json -w '%{http_code}' \
            -X POST https://api.insforge.dev/api/oauth/v1/token \
            -H 'Content-Type: application/json' \
            -d "{\"grant_type\":\"refresh_token\",\"refresh_token\":\"${REFRESH_TOKEN}\",\"client_id\":\"clf_NK8cMUs41gm8ZcfdtSguVw\"}" \
            || echo "000")

          if [ "$HTTP" != "200" ]; then
            echo "::error title=InsForge auth failed (HTTP ${HTTP})::INSFORGE_REFRESH_TOKEN is invalid or expired. Fix it by running 'npx @insforge/cli login' locally, then: python3 -c \"import json,os;print(json.load(open(os.path.expanduser('~/.insforge/credentials.json')))['refresh_token'],end='')\" | gh secret set INSFORGE_REFRESH_TOKEN"
            exit 1
          fi

          ACCESS=$(jq -r '.access_token // empty' /tmp/insforge-token.json)
          if [ -z "$ACCESS" ]; then
            echo "::error title=InsForge auth failed::Token endpoint returned 200 but no access_token was present."
            exit 1
          fi
          echo "::add-mask::$ACCESS"

          mkdir -p ~/.insforge .insforge

          jq -n --arg a "$ACCESS" --arg r "$REFRESH_TOKEN" '{
            access_token: $a,
            refresh_token: $r,
            user: {
              id: "02b1818c-96bb-4558-a914-0880c8ff955a",
              email: "friis1978@gmail.com",
              email_verified: true
            }
          }' > ~/.insforge/credentials.json

          jq -n --arg k "$PROJECT_API_KEY" '{
            project_id: "cc5c166d-a938-43d9-b453-e5fc17a9fd7b",
            project_name: "Job-pilot",
            org_id: "b1a60c39-2c6f-4dd3-aa3f-1896ee8bf988",
            appkey: "8kj4iaqv",
            region: "eu-central",
            oss_host: "https://8kj4iaqv.eu-central.insforge.app",
            api_key: $k
          }' > .insforge/project.json

          rm -f /tmp/insforge-token.json

      - name: Deploy
        run: npx @insforge/cli@latest deployments deploy .

      - name: Verify the site is actually serving
        run: |
          set -uo pipefail
          # A READY deployment record is not proof the site responds. Poll the
          # real origin so a broken deploy fails here instead of in a user's face.
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -m 15 https://devjob.info/ || echo "000")
            echo "attempt ${i}: HTTP ${CODE}"
            if [ "$CODE" = "200" ]; then
              echo "Site is live."
              exit 0
            fi
            sleep 10
          done
          echo "::error title=Deploy verification failed::https://devjob.info/ never returned 200 after the deploy completed."
          exit 1
