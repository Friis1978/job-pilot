[auth]
allowed_redirect_urls = ["https://devjob.info", "https://www.devjob.info", "https://8kj4iaqv.insforge.site", "https://findjob.insforge.site"]
require_email_verification = true
verify_email_method = "code"
reset_password_method = "code"
disable_signup = false

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[auth.smtp]
enabled = false
host = ""
port = 465
username = ""
sender_email = ""
sender_name = ""
min_interval_seconds = 60

[storage]
max_file_size_mb = 50

[realtime]
retention_days = 0

[schedules]
retention_days = 7

[deployments]
subdomain = "findjob"
